version: 2

project_name: gost

before:
  hooks:
    - go mod download

builds:
  - id: gost
    binary: gost
    main: ./cmd/gost
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - freebsd
      - windows
    goarch:
      - 386
      - amd64
      - arm
      - arm64
      - mips
      - mipsle
      - mips64
      - mips64le
      - s390x
      - riscv64
    goarm:
      - "5"
      - "6"
      - "7"
    gomips:
      - softfloat
      - hardfloat
    goamd64:
      - v1
      - v3
    ignore:
      # Darwin: no 32-bit, no arm (32-bit), no mips*, no s390x, no riscv64
      - {goos: darwin, goarch: 386}
      - {goos: darwin, goarch: arm}
      - {goos: darwin, goarch: mips}
      - {goos: darwin, goarch: mipsle}
      - {goos: darwin, goarch: mips64}
      - {goos: darwin, goarch: mips64le}
      - {goos: darwin, goarch: s390x}
      - {goos: darwin, goarch: riscv64}
      # FreeBSD: only 386 + amd64
      - {goos: freebsd, goarch: arm}
      - {goos: freebsd, goarch: arm64}
      - {goos: freebsd, goarch: mips}
      - {goos: freebsd, goarch: mipsle}
      - {goos: freebsd, goarch: mips64}
      - {goos: freebsd, goarch: mips64le}
      - {goos: freebsd, goarch: s390x}
      - {goos: freebsd, goarch: riscv64}
      # Windows: no arm (32-bit), no mips*, no s390x, no riscv64
      - {goos: windows, goarch: arm}
      - {goos: windows, goarch: mips}
      - {goos: windows, goarch: mipsle}
      - {goos: windows, goarch: mips64}
      - {goos: windows, goarch: mips64le}
      - {goos: windows, goarch: s390x}
      - {goos: windows, goarch: riscv64}
      # Linux mips*: only softfloat + hardfloat (32-bit); mips64/mips64le have no float variants
      - {goos: linux, goarch: mips64, gomips: softfloat}
      - {goos: linux, goarch: mips64, gomips: hardfloat}
      - {goos: linux, goarch: mips64le, gomips: softfloat}
      - {goos: linux, goarch: mips64le, gomips: hardfloat}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if .Mips }}_{{ .Mips }}{{ end }}
      {{- if and (eq .Arch "amd64") (ne .Amd64 "v1") }}_{{ .Amd64 }}{{ end }}
    files:
      - none*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^Merge"

release:
  github:
    owner: lovitus
    name: gust
  name_template: "{{.ProjectName}} {{.Tag}}"
