version: 2

project_name: gost

before:
  hooks:
    - go mod download

builds:
  # Non-mips targets: covers linux/darwin/freebsd/windows with arm and amd64 variants
  - id: gost-main
    binary: gost
    main: ./cmd/gost
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - freebsd
      - windows
    goarch:
      - 386
      - amd64
      - arm
      - arm64
      - mips64
      - mips64le
      - s390x
      - riscv64
    goarm:
      - "5"
      - "6"
      - "7"
    goamd64:
      - v1
      - v3
    ignore:
      - {goos: darwin,  goarch: 386}
      - {goos: darwin,  goarch: arm}
      - {goos: darwin,  goarch: mips64}
      - {goos: darwin,  goarch: mips64le}
      - {goos: darwin,  goarch: s390x}
      - {goos: darwin,  goarch: riscv64}
      - {goos: freebsd, goarch: arm}
      - {goos: freebsd, goarch: arm64}
      - {goos: freebsd, goarch: mips64}
      - {goos: freebsd, goarch: mips64le}
      - {goos: freebsd, goarch: s390x}
      - {goos: freebsd, goarch: riscv64}
      - {goos: windows, goarch: arm}
      - {goos: windows, goarch: mips64}
      - {goos: windows, goarch: mips64le}
      - {goos: windows, goarch: s390x}
      - {goos: windows, goarch: riscv64}

  # 32-bit MIPS targets: GOMIPS=softfloat|hardfloat applies only to mips/mipsle
  - id: gost-mips
    binary: gost
    main: ./cmd/gost
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - mips
      - mipsle
    gomips:
      - softfloat
      - hardfloat

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if .Mips }}_{{ .Mips }}{{ end }}
      {{- if and (eq .Arch "amd64") (ne .Amd64 "v1") }}_{{ .Amd64 }}{{ end }}
    files:
      - none*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^Merge"

release:
  github:
    owner: lovitus
    name: gust
  name_template: "{{.ProjectName}} {{.Tag}}"
